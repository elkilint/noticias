<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub | CNN · CBC · Infobae · La República</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2ff 0%, #dbeafe 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: #475569;
            font-size: 0.9rem;
        }

        .quick-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .quick-btn {
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-btn.acciones { background: #1e40af; color: white; }
        .quick-btn.stocks { background: #2563eb; color: white; }
        .quick-btn.ia { background: #3b82f6; color: white; }
        
        .quick-btn.acciones:hover, .quick-btn.stocks:hover, .quick-btn.ia:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .search-bar {
            background: white;
            border-radius: 60px;
            padding: 6px;
            display: flex;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #bfdbfe;
        }

        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-size: 0.95rem;
            outline: none;
            background: transparent;
        }

        .search-bar button {
            background: #1e40af;
            border: none;
            border-radius: 50px;
            padding: 0 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .search-bar button:hover {
            background: #1e3a8a;
        }

        .search-status {
            text-align: center;
            padding: 10px 20px;
            background: #dbeafe;
            border-radius: 50px;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px;
            font-size: 0.85rem;
            color: #1e40af;
        }

        .category-filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: white;
            border: none;
            padding: 10px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid #bfdbfe;
        }

        .cat-btn.active {
            background: #1e40af;
            color: white;
            border-color: #1e40af;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e3a8a;
        }

        .portals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 24px;
        }

        .portal {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .portal-header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
        }

        .portal-count {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
        }

        .news-list {
            max-height: 550px;
            overflow-y: auto;
        }

        .news-item {
            padding: 14px 18px;
            border-bottom: 1px solid #e2e8f0;
        }

        .news-item:hover {
            background: #f8fafc;
        }

        .news-title {
            text-decoration: none;
            color: #0f172a;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            line-height: 1.4;
            font-size: 0.9rem;
        }

        .news-title:hover {
            color: #1e40af;
            text-decoration: underline;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            flex-wrap: wrap;
            gap: 6px;
        }

        .source-badge {
            background: #e0e7ff;
            padding: 2px 10px;
            border-radius: 20px;
            color: #1e40af;
            font-size: 0.6rem;
            font-weight: 500;
        }

        .highlight {
            background: #fef08a;
            padding: 0 2px;
            border-radius: 3px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: #1e40af;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #64748b;
            font-size: 0.7rem;
            border-top: 1px solid #cbd5e1;
        }

        .news-list::-webkit-scrollbar {
            width: 5px;
        }
        .news-list::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        .news-list::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        @media (max-width: 780px) {
            body { padding: 16px; }
            .portals-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📰 NewsHub</h1>
        <p>CNN Español · CBC · Infobae · La República Colombia</p>
    </div>

    <div class="quick-buttons">
        <button class="quick-btn acciones" data-quick="acciones">📈 Acciones</button>
        <button class="quick-btn stocks" data-quick="stocks">💹 Stocks</button>
        <button class="quick-btn ia" data-quick="inteligencia artificial">🤖 Inteligencia Artificial</button>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar: Bitcoin, Petróleo, Cambio climático..." autocomplete="off">
        <button id="searchBtn">Buscar</button>
    </div>

    <div style="text-align: center;" id="searchStatusContainer"></div>

    <div class="category-filters">
        <button class="cat-btn active" data-filter="all">🌐 Todas</button>
        <button class="cat-btn" data-filter="politica">🏛️ Política</button>
        <button class="cat-btn" data-filter="economia">📊 Economía</button>
        <button class="cat-btn" data-filter="tecnologia">💻 Tecnología</button>
    </div>

    <div class="stats" id="stats"></div>

    <div id="portalsContainer" class="portals-grid">
        <div class="loading">🔄 Cargando noticias...<br><small>CNN · CBC · Infobae · La República</small></div>
    </div>

    <footer>Fuente: Google News RSS | Búsqueda en tiempo real</footer>
</div>

<script>
    let currentFilter = "all";
    let currentSearchTerm = "";
    let allNewsData = {};
    let isLoading = true;

    // NOTICIAS DE RESPALDO (en caso de que falle la API)
    const FALLBACK_NEWS = {
        "CNN Español": [
            { title: "La inteligencia artificial revoluciona la industria tecnológica", link: "#", pubDate: new Date().toISOString(), category: "tecnologia", description: "Avances en IA" },
            { title: "El precio del petróleo sube por tensiones geopolíticas", link: "#", pubDate: new Date().toISOString(), category: "economia", description: "Mercado energético" },
            { title: "Elecciones 2026: qué esperar en América Latina", link: "#", pubDate: new Date().toISOString(), category: "politica", description: "Procesos electorales" },
            { title: "Bitcoin supera los $75,000 y marca nuevo récord", link: "#", pubDate: new Date().toISOString(), category: "economia", description: "Criptomonedas" },
            { title: "Apple presenta nuevo dispositivo con IA integrada", link: "#", pubDate: new Date().toISOString(), category: "tecnologia", description: "Innovación" }
        ],
        "CBC News": [
            { title: "Canada's AI strategy: New investments announced", link: "#", pubDate: new Date().toISOString(), category: "tecnologia", description: "Tech news" },
            { title: "Oil prices surge amid global uncertainty", link: "#", pubDate: new Date().toISOString(), category: "economia", description: "Energy market" },
            { title: "Federal election campaign heats up", link: "#", pubDate: new Date().toISOString(), category: "politica", description: "Politics" }
        ],
        "Infobae": [
            { title: "El dólar blue sube y preocupa al mercado", link: "#", pubDate: new Date().toISOString(), category: "economia", description: "Tipo de cambio" },
            { title: "Inteligencia artificial: el futuro del trabajo", link: "#", pubDate: new Date().toISOString(), category: "tecnologia", description: "Empleo y tecnología" },
            { title: "Reforma política: debate en el Congreso", link: "#", pubDate: new Date().toISOString(), category: "politica", description: "Legislativo" }
        ],
        "La República": [
            { title: "Colombia apuesta por la inteligencia artificial", link: "#", pubDate: new Date().toISOString(), category: "tecnologia", description: "Innovación" },
            { title: "Precio del dólar hoy: cierra en $4,150", link: "#", pubDate: new Date().toISOString(), category: "economia", description: "Tasa de cambio" },
            { title: "Reforma política: claves del nuevo proyecto", link: "#", pubDate: new Date().toISOString(), category: "politica", description: "Legislativo" }
        ]
    };

    // Función para obtener RSS de Google News usando el proxy correcto
    async function fetchGoogleNewsRSS(query) {
        const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=es-419&gl=US&ceid=US:es-419`;
        
        // Opción 1: Intentar con rss2json (el más común)
        try {
            const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            const response = await fetch(proxyUrl, { mode: 'cors' });
            const data = await response.json();
            if (data.status === "ok" && data.items && data.items.length > 0) {
                console.log("✅ RSS2JSON funcionó para:", query.substring(0, 50));
                return data.items;
            }
        } catch (e) {
            console.log("❌ RSS2JSON falló:", e.message);
        }

        // Opción 2: Intentar con allorigins
        try {
            const alloriginsUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
            const response = await fetch(alloriginsUrl);
            const data = await response.json();
            if (data.contents) {
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                const articles = [];
                for (let item of items) {
                    articles.push({
                        title: item.querySelector("title")?.textContent || "",
                        link: item.querySelector("link")?.textContent || "",
                        pubDate: item.querySelector("pubDate")?.textContent || "",
                        description: item.querySelector("description")?.textContent || ""
                    });
                }
                if (articles.length > 0) {
                    console.log("✅ AllOrigins funcionó para:", query.substring(0, 50));
                    return articles;
                }
            }
        } catch (e) {
            console.log("❌ AllOrigins falló:", e.message);
        }
        
        return [];
    }

    function cleanTitle(title) {
        if (!title) return "";
        return title.replace(/\s+[-|]\s+[A-Za-z0-9\s]+$/, '').trim();
    }

    function detectCategory(title, description, queryCategory) {
        // Si la consulta ya era de una categoría específica, úsala
        if (queryCategory) return queryCategory;
        
        const text = (title + " " + description).toLowerCase();
        if (text.includes("política") || text.includes("gobierno") || text.includes("elección") || text.includes("presidente")) return "politica";
        if (text.includes("economía") || text.includes("dólar") || text.includes("inflación") || text.includes("mercado") || text.includes("bitcoin")) return "economia";
        if (text.includes("tecnología") || text.includes("inteligencia artificial") || text.includes("ia") || text.includes("software")) return "tecnologia";
        
        return "general";
    }

    async function loadPortalNews(portalName, portalConfig) {
        const categories = ["politica", "economia", "tecnologia"];
        let allArticles = [];

        for (let cat of categories) {
            const query = portalConfig.queries[cat];
            if (!query) continue;
            
            const items = await fetchGoogleNewsRSS(query);
            if (items && items.length > 0) {
                const articlesWithCat = items.slice(0, 10).map(item => ({
                    title: cleanTitle(item.title),
                    link: item.link,
                    pubDate: item.pubDate,
                    description: item.description?.replace(/<[^>]*>/g, '') || "",
                    category: cat
                }));
                allArticles = allArticles.concat(articlesWithCat);
            }
        }

        // Eliminar duplicados
        const unique = [];
        const seen = new Set();
        for (let art of allArticles) {
            const key = art.title.substring(0, 80);
            if (!seen.has(key)) {
                seen.add(key);
                unique.push(art);
            }
        }

        // Si no hay noticias reales, usar respaldo
        if (unique.length === 0 && FALLBACK_NEWS[portalName]) {
            console.log(`📰 Usando respaldo para ${portalName}`);
            return FALLBACK_NEWS[portalName].map(n => ({ ...n, category: n.category }));
        }

        return unique.slice(0, 30);
    }

    const PORTALS_CONFIG = {
        "CNN Español": {
            queries: {
                politica: "site:cnnespanol.cnn.com política gobierno elecciones",
                economia: "site:cnnespanol.cnn.com economía mercado dólar inflación",
                tecnologia: "site:cnnespanol.cnn.com tecnología inteligencia artificial"
            }
        },
        "CBC News": {
            queries: {
                politica: "site:cbc.ca politics government election",
                economia: "site:cbc.ca economy market inflation",
                tecnologia: "site:cbc.ca technology artificial intelligence"
            }
        },
        "Infobae": {
            queries: {
                politica: "site:infobae.com política gobierno elecciones",
                economia: "site:infobae.com economía dólar mercado inflación",
                tecnologia: "site:infobae.com tecnología inteligencia artificial"
            }
        },
        "La República": {
            queries: {
                politica: "site:larepublica.co política gobierno elecciones",
                economia: "site:larepublica.co economía mercado dólar",
                tecnologia: "site:larepublica.co tecnología inteligencia artificial"
            }
        }
    };

    async function loadAllNews() {
        const container = document.getElementById("portalsContainer");
        container.innerHTML = '<div class="loading">🔄 Cargando noticias...<br><small>Esto puede tomar unos segundos</small></div>';
        
        const results = {};
        const portalNames = Object.keys(PORTALS_CONFIG);
        
        for (let name of portalNames) {
            console.log(`Cargando ${name}...`);
            const articles = await loadPortalNews(name, PORTALS_CONFIG[name]);
            results[name] = articles;
            console.log(`✅ ${name}: ${articles.length} noticias`);
        }
        
        allNewsData = results;
        isLoading = false;
        updateStatsAndRender();
    }

    function normalizeText(text) {
        return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function matchesSearch(article, searchTerm) {
        if (!searchTerm || searchTerm.trim() === "") return true;
        const term = normalizeText(searchTerm);
        const title = normalizeText(article.title);
        const desc = normalizeText(article.description);
        return title.includes(term) || desc.includes(term);
    }

    function formatDate(dateStr) {
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return "";
            const diff = Math.floor((new Date() - d) / 60000);
            if (diff < 1) return "ahora";
            if (diff < 60) return `hace ${diff} min`;
            if (diff < 1440) return `hace ${Math.floor(diff/60)} h`;
            if (diff < 10080) return `hace ${Math.floor(diff/1440)} d`;
            return d.toLocaleDateString("es-ES");
        } catch(e) { return ""; }
    }

    function highlightText(text, searchTerm) {
        if (!searchTerm || searchTerm.trim() === "") return text;
        const term = searchTerm.toLowerCase();
        try {
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, `<span class="highlight">$1</span>`);
        } catch(e) { return text; }
    }

    function updateStatsAndRender() {
        let counts = { politica: 0, economia: 0, tecnologia: 0 };
        let total = 0;
        
        for (let portal in allNewsData) {
            for (let art of allNewsData[portal]) {
                if (matchesSearch(art, currentSearchTerm)) {
                    if (art.category === "politica") counts.politica++;
                    else if (art.category === "economia") counts.economia++;
                    else if (art.category === "tecnologia") counts.tecnologia++;
                    total++;
                }
            }
        }
        
        document.getElementById("stats").innerHTML = `
            <div class="stat-card">📰 Total: ${total}</div>
            <div class="stat-card">🏛️ Política: ${counts.politica}</div>
            <div class="stat-card">📊 Economía: ${counts.economia}</div>
            <div class="stat-card">💻 Tecnología: ${counts.tecnologia}</div>
        `;
        
        const statusContainer = document.getElementById("searchStatusContainer");
        if (currentSearchTerm) {
            statusContainer.innerHTML = `<div class="search-status">🔍 Resultados para: <strong>"${escapeHtml(currentSearchTerm)}"</strong> — ${total} noticias</div>`;
        } else {
            statusContainer.innerHTML = "";
        }
        
        render();
    }

    function render() {
        const container = document.getElementById("portalsContainer");
        
        let html = '<div class="portals-grid">';
        
        for (let portalName in allNewsData) {
            let articles = [...allNewsData[portalName]];
            
            if (currentSearchTerm) {
                articles = articles.filter(a => matchesSearch(a, currentSearchTerm));
            }
            
            if (currentFilter !== "all") {
                articles = articles.filter(a => a.category === currentFilter);
            }
            
            html += `
                <div class="portal">
                    <div class="portal-header">
                        ${portalName}
                        <span class="portal-count">${articles.length}</span>
                    </div>
                    <div class="news-list">
            `;
            
            if (articles.length === 0) {
                html += `<div class="no-results">
                    📭 ${currentSearchTerm ? `Sin resultados para "${escapeHtml(currentSearchTerm)}"` : "Sin noticias en esta categoría"}
                </div>`;
            } else {
                for (let art of articles) {
                    let catEmoji = { politica:"🏛️", economia:"📊", tecnologia:"💻", general:"📰" }[art.category];
                    let catName = { politica:"Política", economia:"Economía", tecnologia:"Tecnología", general:"General" }[art.category];
                    const fechaStr = formatDate(art.pubDate);
                    const titleHighlighted = highlightText(art.title, currentSearchTerm);
                    
                    html += `
                        <div class="news-item">
                            <a href="${art.link}" target="_blank" rel="noopener noreferrer" class="news-title">
                                ${titleHighlighted}
                            </a>
                            <div class="news-meta">
                                <span class="source-badge">${catEmoji} ${catName}</span>
                                ${fechaStr ? `<span>📅 ${fechaStr}</span>` : ''}
                            </div>
                        </div>
                    `;
                }
            }
            
            html += `</div></div>`;
        }
        
        html += '</div>';
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    function performSearch() {
        const input = document.getElementById("searchInput");
        currentSearchTerm = input.value.trim();
        updateStatsAndRender();
    }
    
    function quickSearch(term) {
        document.getElementById("searchInput").value = term;
        currentSearchTerm = term;
        updateStatsAndRender();
    }
    
    // Eventos
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            render();
        });
    });
    
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const term = btn.getAttribute('data-quick');
            quickSearch(term);
        });
    });
    
    document.getElementById("searchBtn").addEventListener("click", performSearch);
    document.getElementById("searchInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") performSearch();
    });
    
    loadAllNews();
</script>
</body>
</html>
