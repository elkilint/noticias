<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NewsHub Pro - Azul</title>
    <style>
        :root { --blue-dark: #002d5b; --blue-mid: #0056b3; --blue-light: #eef6ff; }
        body { font-family: sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; background: var(--blue-dark); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        
        /* Buscador y Botones */
        .search-area { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        input { width: 60%; padding: 12px; border: 2px solid var(--blue-mid); border-radius: 5px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--blue-mid); color: white; }
        .btn-quick { background: #e0e0e0; margin: 5px; color: var(--blue-dark); }
        .btn-quick:hover { background: var(--blue-mid); color: white; }

        /* Grid de Noticias */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .column { background: white; border-top: 5px solid var(--blue-dark); border-radius: 8px; height: 600px; display: flex; flex-direction: column; }
        .col-header { padding: 15px; background: var(--blue-light); font-weight: bold; border-bottom: 1px solid #ddd; }
        .news-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
        .item a { text-decoration: none; color: #004085; font-weight: 600; display: block; margin-bottom: 5px; }
        .item a:hover { text-decoration: underline; }
        .tag { font-size: 0.7rem; background: #ddd; padding: 2px 5px; border-radius: 3px; }
        
        .loading { text-align: center; padding: 20px; color: var(--blue-mid); font-style: italic; }
        .error { color: red; font-size: 0.8rem; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>NEWSHUB CORPORATE</h1>
        <p>CNN · CBC · INFOBAE · LA REPUBLICA</p>
    </header>

    <div class="search-area">
        <input type="text" id="q" placeholder="Buscar tema específico...">
        <button class="btn-main" onclick="searchAll()">BUSCAR AHORA</button>
        <div style="margin-top:10px">
            <button class="btn-quick" onclick="quick('acciones')">📈 Acciones</button>
            <button class="btn-quick" onclick="quick('stocks')">💹 Stocks</button>
            <button class="btn-quick" onclick="quick('inteligencia artificial')">🤖 IA</button>
        </div>
    </div>

    <div class="news-grid" id="grid">
        <!-- Las columnas se generan por JS -->
    </div>
</div>

<script>
    const PORTALS = [
        { id: 'cnn', name: 'CNN en Español', site: 'cnnespanol.cnn.com' },
        { id: 'cbc', name: 'CBC News', site: 'cbc.ca' },
        { id: 'infobae', name: 'Infobae', site: 'infobae.com/america' },
        { id: 'republica', name: 'La República', site: 'larepublica.co' }
    ];

    // Función principal para obtener noticias
    async function getNews(portal, query) {
        const fullQuery = `site:${portal.site} ${query}`;
        const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(fullQuery)}&hl=es-419&gl=CO&ceid=CO:es-419`;
        
        // Usamos un proxy secundario (allorigins) que es más estable para uso local
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
        
        try {
            const resp = await fetch(proxy);
            const data = await resp.json();
            
            // Parsear el XML del RSS manualmente
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            
            let html = '';
            // Traer entre 20 y 30 resultados
            const limit = Math.min(items.length, 30);
            
            for(let i=0; i < limit; i++) {
                const title = items[i].querySelector("title").textContent;
                const link = items[i].querySelector("link").textContent;
                const date = new Date(items[i].querySelector("pubDate").textContent).toLocaleDateString();
                
                html += `
                    <div class="item">
                        <a href="${link}" target="_blank">${title.split(' - ')[0]}</a>
                        <span class="tag">${date}</span>
                    </div>
                `;
            }
            return html || '<p class="error">No se encontraron noticias recientes.</p>';
        } catch (err) {
            return `<p class="error">Error de conexión con el portal.</p>`;
        }
    }

    async function loadColumns(query = "política OR economía OR tecnología") {
        const grid = document.getElementById('grid');
        grid.innerHTML = ''; // Limpiar

        PORTALS.forEach(async (p) => {
            // Crear la estructura de la columna inmediatamente
            const col = document.createElement('div');
            col.className = 'column';
            col.innerHTML = `
                <div class="col-header">${p.name}</div>
                <div class="news-list" id="list-${p.id}"><p class="loading">Cargando...</p></div>
            `;
            grid.appendChild(col);

            // Cargar el contenido
            const content = await getNews(p, query);
            document.getElementById(`list-${p.id}`).innerHTML = content;
        });
    }

    function searchAll() {
        const val = document.getElementById('q').value;
        if(val) loadColumns(val);
    }

    function quick(topic) {
        document.getElementById('q').value = topic;
        loadColumns(topic);
    }

    // Carga inicial
    window.onload = () => loadColumns();
</script>

</body>
</html>
